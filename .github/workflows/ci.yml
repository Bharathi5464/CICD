name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-cicd-app:1.0 .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-cicd-app:1.0

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/devops-cicd-app

            git pull origin main

            docker stop my-app || true
            docker rm my-app || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-cicd-app:1.0

            docker run -d -p 80:5000 --name my-app \
            ${{ secrets.DOCKER_USERNAME }}/devops-cicd-app:1.0